name: pizzacorn_maps
description: "Pizzacorn Maps: mapas, marcadores, geocoding y búsqueda para apps Pizzacorn."
version: 0.0.1
publish_to: none

homepage: https://github.com/Pizzacorn/pizzacorn_maps
repository: https://github.com/Pizzacorn/pizzacorn_maps
issue_tracker: https://github.com/Pizzacorn/pizzacorn_maps/issues
topics:
  - maps
  - google-maps
  - flutter-map
  - pizzacorn

environment:
  sdk: ^3.9.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

  pizzacorn_ui:
    path: ..

  cloud_firestore: ^6.1.1
  flutter_map: ^8.2.1
  flutter_map_marker_cluster_plus: ^1.4.2
  flutter_riverpod: ^2.6.1
  geoflutterfire_plus: ^0.0.33
  geolocator: ^14.0.1
  http: ^1.5.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
